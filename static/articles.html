<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Artikelverwaltung</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <h1>Artikelverwaltung</h1>
  <p><a href="/">&larr; Zurück zur Kasse</a></p>

  <section>
    <h2 id="form-title">Neuer Artikel</h2>
    <form id="product-form">
      <input type="hidden" id="product-id">
      <label>
        Name
        <input type="text" id="product-name" required>
      </label>
      <label>
        Preis (€)
        <input type="number" id="product-price" step="0.01" min="0" required>
      </label>
      <button type="submit" id="submit-button">Hinzufügen</button>
      <button type="button" id="cancel-button" hidden>Abbrechen</button>
    </form>
    <p id="message"></p>
  </section>

  <section>
    <h2>Artikel</h2>
    <table id="product-table">
      <thead>
        <tr>
          <th>Name</th>
          <th>Preis</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="product-table-body"></tbody>
    </table>
  </section>

  <script src="/static/articles.js"></script>
</body>
</html>
